<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D列印AI輔助網頁</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(34, 197, 94, 0.3); /* green-500 tint */
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border-top-color: #22c55e;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tab-active {
            color: #22c55e;
            border-bottom: 2px solid #22c55e;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-green-600">3D Print AI</h1>
            <div class="space-x-8">
                <button onclick="switchTab('ai-assistant')" id="nav-ai-assistant" class="tab-active font-medium transition-colors hover:text-green-500">AI 參數助手</button>
                <button onclick="switchTab('filaments')" id="nav-filaments" class="font-medium transition-colors hover:text-green-500">耗材介紹</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4 max-w-6xl mx-auto">
        
        <!-- Section: AI Assistant -->
        <section id="ai-assistant-section" class="fade-in">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">3D列印AI輔助網頁</h2>
                <p class="text-gray-500 text-lg">為您的創意尋找最完美的列印參數</p>
            </div>

            <div class="max-w-2xl mx-auto glass rounded-3xl p-8 mb-12">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-2">要製作的物品</label>
                        <input type="text" id="input-object" placeholder="例如：手機架、齒輪、公仔..." 
                            class="w-full px-4 py-3 rounded-xl bg-white/50 border border-white/30 focus:outline-none focus:ring-2 focus:ring-green-500/50 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-2">使用情境</label>
                        <input type="text" id="input-scenario" placeholder="例如：放在車上抗熱、給小朋友玩、純外觀展示..." 
                            class="w-full px-4 py-3 rounded-xl bg-white/50 border border-white/30 focus:outline-none focus:ring-2 focus:ring-green-500/50 transition-all">
                    </div>
                    <button onclick="analyzeParameters()" 
                        class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg shadow-green-500/30 transition-all transform active:scale-95">
                        開始分析參數
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="hidden text-center py-12">
                <div class="inline-block w-12 h-12 border-4 border-gray-200 border-t-green-500 rounded-full loader mb-4"></div>
                <p class="text-gray-600 animate-pulse">正在為您的模型計算最穩固的結構...</p>
            </div>

            <!-- Result Cards Area -->
            <div id="result-area" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                <!-- Cards will be injected here -->
            </div>
        </section>

        <!-- Section: Filaments Guide -->
        <section id="filaments-section" class="hidden fade-in">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">耗材百科全書</h2>
                <p class="text-gray-500 text-lg">探索各種材料的特性與無限可能</p>
            </div>

            <!-- Stage 1: Categories -->
            <div id="filament-categories" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Category buttons will be injected here -->
            </div>

            <!-- Stage 2: Details -->
            <div id="filament-details" class="hidden">
                <button onclick="showCategories()" class="mb-8 flex items-center text-green-600 font-medium hover:text-green-700 transition-colors">
                    <span class="mr-2">←</span> 返回分類列表
                </button>
                <div id="filament-cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Filament cards will be injected here -->
                </div>
            </div>
        </section>

    </main>

        // --- Core Functions ---

        function switchTab(tabId) {
            // UI Toggle
            const sections = ['ai-assistant-section', 'filaments-section'];
            sections.forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(`${tabId}-section`).classList.remove('hidden');

            // Nav Styling
            document.getElementById('nav-ai-assistant').classList.remove('tab-active');
            document.getElementById('nav-filaments').classList.remove('tab-active');
            document.getElementById(`nav-${tabId}`).classList.add('tab-active');

            if (tabId === 'filaments') {
                showCategories();
            }
        }

        // AI Assistant Logic
        function analyzeParameters() {
            const object = document.getElementById('input-object').value;
            const scenario = document.getElementById('input-scenario').value;

            if (!object || !scenario) {
                alert('請填寫物品名稱與使用情境！');
                return;
            }

            // Hide old results, show loader
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            // Mock "AI" Processing
            setTimeout(() => {
                renderResults(object, scenario);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
            }, 1500);
        }

        function renderResults(object, scenario) {
            const resultArea = document.getElementById('result-area');
            
            // Logic to pick material based on scenario (Simple Keyword Matching)
            let primaryMaterial = "PLA";
            if (scenario.includes("熱") || scenario.includes("車")) primaryMaterial = "ABS/ASA";
            if (scenario.includes("強") || scenario.includes("零件")) primaryMaterial = "PETG/Nylon";
            if (scenario.includes("軟") || scenario.includes("彈")) primaryMaterial = "TPU";

            const mockData = [
                {
                    type: "耐用型",
                    style: "border-green-500/30",
                    material: primaryMaterial === "PLA" ? "PETG / Nylon" : primaryMaterial,
                    layer: "0.2mm",
                    infill: "40% (Gyroid 幾何)",
                    temp: "240°C - 260°C"
                },
                {
                    type: "經濟型",
                    style: "border-blue-500/30",
                    material: "PLA+ / PETG",
                    layer: "0.28mm",
                    infill: "15% (Grid 網格)",
                    temp: "210°C - 230°C"
                },
                {
                    type: "樣品型",
                    style: "border-purple-500/30",
                    material: "PLA",
                    layer: "0.2mm",
                    infill: "8% (Lightning 雷電)",
                    temp: "200°C"
                }
            ];

            resultArea.innerHTML = mockData.map(item => `
                <div class="glass p-6 rounded-3xl border-t-4 ${item.style} hover:shadow-2xl transition-all">
                    <h3 class="text-xl font-bold mb-4 text-gray-700">${item.type}</h3>
                    <div class="space-y-4">
                        <div class="bg-white/30 p-3 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">材料推薦</p>
                            <p class="font-bold text-green-600">${item.material}</p>
                        </div>
                        <div class="bg-white/30 p-3 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">層高建議</p>
                            <p class="font-bold">${item.layer}</p>
                        </div>
                        <div class="bg-white/30 p-3 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">填充密度</p>
                            <p class="font-bold">${item.infill}</p>
                        </div>
                        <div class="bg-white/30 p-3 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">噴嘴溫度</p>
                            <p class="font-bold">${item.temp}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filaments Encyclopedia Logic
        function showCategories() {
            document.getElementById('filament-details').classList.add('hidden');
            document.getElementById('filament-categories').classList.remove('hidden');

            const categories = [...new Set(filamentDatabase.map(f => f.category))];
            const container = document.getElementById('filament-categories');

            container.innerHTML = categories.map(cat => `
                <button onclick="showDetails('${cat}')" 
                    class="glass p-8 rounded-3xl text-left glass-hover h-48 flex flex-col justify-end group overflow-hidden relative">
                    <div class="absolute inset-0 bg-gradient-to-t from-green-500/10 to-transparent group-hover:from-green-500/20 transition-all"></div>
                    <span class="text-lg font-bold relative z-10">${cat}</span>
                    <span class="text-xs text-gray-500 mt-2 relative z-10">點擊查看詳細耗材資料 →</span>
                </button>
            `).join('');
        }

        function showDetails(categoryName) {
            const categoriesEl = document.getElementById('filament-categories');
            const detailsEl = document.getElementById('filament-details');
            const cardsContainer = document.getElementById('filament-cards-container');

            // Filter data
            const filtered = filamentDatabase.filter(f => f.category === categoryName);

            // Render cards
            cardsContainer.innerHTML = filtered.map(item => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col glass-hover border-transparent">
                    <div class="h-48 overflow-hidden relative bg-gray-200">
                        <!-- 成品圖片展示區 -->
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                        <!-- <img src="placeholders/${item.id}.jpg" alt="替換成真實成品圖"> -->
                        <div class="absolute top-4 left-4">
                            <span class="px-3 py-1 bg-white/60 backdrop-blur-md text-xs font-bold rounded-full text-green-700 border border-white/40">
                                ${item.id.toUpperCase()}
                            </span>
                        </div>
                    </div>
                    <div class="p-6 space-y-4">
                        <h3 class="text-xl font-bold text-gray-800">${item.name}</h3>
                        
                        <div>
                            <p class="text-xs font-bold text-green-600 mb-1 uppercase tracking-tighter">特性</p>
                            <ul class="text-sm text-gray-600 list-disc list-inside">
                                ${item.features.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>

                        <div>
                            <p class="text-xs font-bold text-red-400 mb-1 uppercase tracking-tighter">缺點 / 挑戰</p>
                            <ul class="text-sm text-gray-500 list-disc list-inside">
                                ${item.drawbacks.map(d => `<li>${d}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="pt-4 border-t border-white/20">
                            <p class="text-xs font-bold text-gray-400 mb-1 uppercase">常見應用</p>
                            <p class="text-sm text-gray-600 italic">${item.applications}</p>
                        </div>
                        
                        <div class="text-[10px] text-gray-400">
                            <strong>衍生款式：</strong> ${item.variants}
                        </div>
                    </div>
                </div>
            `).join('');

            // Animations
            categoriesEl.classList.add('hidden');
            detailsEl.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize
        window.onload = () => {
